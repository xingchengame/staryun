<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星际互联 - 高性能游戏云服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        :root {
            --primary-blue: #002699;
            --light-blue: #409eff;
            --deep-blue: #001440;
            --gold-primary: #ffd700;
            --gold-deep: #b8860b;
            --gold-light: #fffacd;
            --text-white: #ffffff;
            --text-gray: #e0e6ff;
        }

        /* ===================== 核心层级逻辑 ===================== */
        /* 最底层：全局固定金色波纹背景 */
        html, body {
            width: 100%;
            min-height: 600vh; /* 6倍视口高度，对应6个滚动阶段 */
            margin: 0;
            padding: 0;
            /* 金色波纹+反光背景，固定不动 */
            background: 
                linear-gradient(110deg, 
                    transparent 0%, 
                    rgba(255, 250, 205, 0.4) 45%, 
                    rgba(255, 255, 255, 0.6) 50%, 
                    rgba(255, 250, 205, 0.4) 55%, 
                    transparent 100%),
                repeating-linear-gradient(45deg, 
                    rgba(184, 134, 11, 0.3) 0px, 
                    rgba(255, 215, 0, 0.1) 10px, 
                    rgba(184, 134, 11, 0.3) 20px),
                radial-gradient(ellipse at center, #ffd700 0%, #b8860b 60%, #8b6914 100%);
            background-size: 200% 200%, 200% 200%, 100% 100%;
            background-attachment: fixed;
            overflow-x: hidden;
            /* 金色背景动画 */
            animation: waveFlow 8s linear infinite, lightSweep 6s ease-in-out infinite;
        }

        /* 波纹流动动画 */
        @keyframes waveFlow {
            0% { background-position: 0 0, 0 0, center; }
            100% { background-position: 0 0, 200px 200px, center; }
        }

        /* 金属扫光反光动画 */
        @keyframes lightSweep {
            0% { background-position: -200% 0, 0 0, center; }
            100% { background-position: 200% 0, 0 0, center; }
        }

        /* 繁星闪烁动画 */
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ===================== 置顶顶部栏（最顶层） ===================== */
        /* 顶部提示条 */
        .top-banner {
            width: 100%;
            min-height: 40px;
            background: rgba(0, 30, 80, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 101;
            padding: 8px 50px 8px 20px;
        }

        .banner-text {
            color: var(--text-white);
            text-decoration: none;
            font-size: clamp(12px, 3vw, 14px);
            flex: 1;
            text-align: center;
            transition: color 0.3s ease;
            line-height: 1.4;
        }

        .banner-text:hover {
            color: var(--light-blue);
        }

        .banner-close {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-white);
            font-size: 22px;
            cursor: pointer;
            padding: 0 8px;
            line-height: 1;
            transition: opacity 0.3s ease;
        }

        .banner-close:hover {
            opacity: 0.7;
        }

        /* 顶部导航栏 - 严格按需求简化 */
        .navbar {
            width: 100%;
            height: 60px;
            background: rgba(0, 20, 60, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            top: 40px;
            left: 0;
            z-index: 100;
            transition: top 0.3s ease;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .nav-logo img {
            height: 40px;
            object-fit: contain;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-left: 60px;
        }

        .nav-item {
            color: var(--text-white);
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--light-blue);
            transition: width 0.3s ease;
        }

        .nav-item:hover {
            color: var(--light-blue);
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .nav-user {
            margin-left: auto;
            flex-shrink: 0;
        }

        .login-btn {
            color: var(--text-white);
            text-decoration: none;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: rgba(64, 158, 255, 0.2);
            color: var(--light-blue);
        }

        /* 汉堡菜单按钮 - 移动端专用 */
        .hamburger-btn {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px;
            margin-left: auto;
        }

        .hamburger-btn span {
            width: 24px;
            height: 2px;
            background: var(--text-white);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* 移动端侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100vh;
            background: rgba(0, 20, 60, 0.98);
            backdrop-filter: blur(10px);
            z-index: 200;
            transition: right 0.4s ease;
            padding: 80px 30px 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-white);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }

        .sidebar-item {
            color: var(--text-white);
            text-decoration: none;
            font-size: 18px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: color 0.3s ease;
        }

        .sidebar-item:hover {
            color: var(--light-blue);
        }

        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            z-index: 199;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ===================== 中间层：蓝色繁星面板（JS控制滚动变化） ===================== */
        .slant-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, var(--deep-blue) 0%, var(--primary-blue) 100%);
            z-index: 1;
            transition: clip-path 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            overflow: hidden;
        }

        /* 繁星容器 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .stars span {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: #ffffff;
            animation: twinkle 3s infinite alternate;
        }

        /* ===================== 最上层：置顶文字内容（永远在最前面，无冲突） ===================== */
        .text-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 90%;
            max-width: 700px;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* 标题样式 */
        .text-container h2 {
            font-size: clamp(24px, 8vw, 56px);
            line-height: 1.3;
            font-weight: 900;
            margin-bottom: 30px;
            color: var(--text-white);
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* 列表样式 */
        .text-container p {
            font-size: clamp(14px, 3vw, 18px);
            line-height: 1.6;
            color: var(--text-white);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px 20px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .text-container p span {
            position: relative;
            padding-left: 20px;
            flex-shrink: 0;
        }

        .text-container p span::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-white);
        }

        /* 手机端适配 */
        @media screen and (max-width: 768px) {
            .nav-menu {
                display: none;
            }
            .hamburger-btn {
                display: flex;
            }
            .navbar {
                padding: 0 20px;
            }
            .nav-logo img {
                height: 35px;
            }
            .text-container {
                width: 85%;
            }
            .text-container p {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }

        @media screen and (max-width: 480px) {
            .text-container h2 {
                font-size: clamp(20px, 6vw, 36px);
                margin-bottom: 20px;
            }
            .text-container p {
                font-size: clamp(13px, 3.5vw, 15px);
            }
        }
    </style>
</head>
<body>
    <!-- 置顶顶部提示条 -->
    <div class="top-banner" id="topBanner">
        <a href="/un/index.html" class="banner-text">开启性能模式（可随时在个人中心变更）</a>
        <button class="banner-close" id="bannerClose">×</button>
    </div>

    <!-- 置顶导航栏（严格按需求简化） -->
    <nav class="navbar" id="navbar">
        <div class="nav-logo">
            <img src="/jpg/logo1.jpg" alt="平台logo">
            <img src="/jpg/logo2.jpg" alt="品牌logo">
        </div>
        <!-- 仅保留指定的导航项 -->
        <div class="nav-menu">
            <a href="#" class="nav-item">首页</a>
            <a href="#" class="nav-item">节点状态</a>
            <a href="#" class="nav-item">整合包广场</a>
            <a href="#" class="nav-item">游戏市场</a>
        </div>
        <div class="nav-user">
            <a href="#" class="login-btn" id="loginBtn">登录</a>
        </div>
        <!-- 移动端汉堡按钮 -->
        <button class="hamburger-btn" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- 移动端侧边栏 -->
    <div class="sidebar" id="sidebar">
        <button class="sidebar-close" id="sidebarClose">×</button>
        <a href="#" class="sidebar-item">首页</a>
        <a href="#" class="sidebar-item">节点状态</a>
        <a href="#" class="sidebar-item">整合包广场</a>
        <a href="#" class="sidebar-item">游戏市场</a>
        <a href="#" class="sidebar-item">个人中心</a>
        <a href="#" class="sidebar-item">客服支持</a>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- 中间层：蓝色繁星面板（JS控制滚动变化） -->
    <div class="slant-panel" id="slantPanel">
        <div class="stars" id="stars"></div>
    </div>

    <!-- 最上层：置顶文字内容（永远在最前面，无冲突） -->
    <div class="text-container" id="textContainer"></div>

    <script>
        // ===================== 内容配置 =====================
        const pageContent = [
            {
                title: "天津骨干BGP线路 全国20ms低延迟",
                list: [
                    "原生公网IP接入",
                    "多线运营商冗余备份",
                    "智能流量负载均衡",
                    "99.99%服务在线率保障",
                    "超低抖动无丢包"
                ]
            },
            {
                title: "企业级稳定数据库服务",
                list: [
                    "多副本实时热备",
                    "自动定时快照备份",
                    "秒级数据回滚恢复",
                    "高并发低延迟读写优化",
                    "分布式集群扩展支持"
                ]
            },
            {
                title: "全方位安全防火墙防护",
                list: [
                    "T级DDoS攻击清洗",
                    "WAF应用层防火墙",
                    "实时入侵检测与防御",
                    "访问权限精细化管控",
                    "恶意流量智能拦截"
                ]
            },
            {
                title: "全链路数据安全保障",
                list: [
                    "端到端TLS加密传输",
                    "敏感数据脱敏存储",
                    "全操作合规审计日志",
                    "异地多副本容灾备份",
                    "符合国家数据安全规范"
                ]
            },
            {
                title: "全天候售后支持与生态服务",
                list: [
                    "7×24小时在线技术支持",
                    "专属玩家交流社群",
                    "整合包一键部署广场",
                    "正版游戏资源市场",
                    "官方友链合作开放"
                ]
            },
            {
                title: "合规经营与信息公示",
                list: [
                    "ICP备案资质公示",
                    "网络安全等级保护认证",
                    "服务条款与隐私政策",
                    "合规经营许可",
                    "投诉建议反馈渠道"
                ]
            }
        ];

        // ===================== 基础功能 =====================
        // 1. 顶部提示条永久关闭
        const topBanner = document.getElementById('topBanner');
        const bannerClose = document.getElementById('bannerClose');
        const navbar = document.getElementById('navbar');

        if (localStorage.getItem('performanceBannerClosed') === 'true') {
            topBanner.style.display = 'none';
            navbar.style.top = '0';
        }

        bannerClose.addEventListener('click', () => {
            topBanner.style.display = 'none';
            navbar.style.top = '0';
            localStorage.setItem('performanceBannerClosed', 'true');
        });

        // 2. 移动端汉堡菜单
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarClose = document.getElementById('sidebarClose');
        const overlay = document.getElementById('overlay');

        function openSidebar() {
            sidebar.classList.add('active');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        hamburgerBtn.addEventListener('click', openSidebar);
        sidebarClose.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', closeSidebar);
        });

        // 3. 生成繁星效果
        const starsContainer = document.getElementById('stars');
        const starCount = 100;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('span');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.opacity = Math.random() * 0.8 + 0.2;
            starsContainer.appendChild(star);
        }

        // ===================== 核心：JS捕捉滚轮，控制蓝色面板变化 =====================
        const slantPanel = document.getElementById('slantPanel');
        const textContainer = document.getElementById('textContainer');
        let viewHeight = window.innerHeight;
        const totalStages = pageContent.length;

        // 内容渲染函数
        function renderContent(stageIndex) {
            const content = pageContent[stageIndex];
            const listHtml = content.list.map(item => `<span>${item}</span>`).join('');
            // 淡入切换效果
            textContainer.style.opacity = 0;
            setTimeout(() => {
                textContainer.innerHTML = `
                    <h2>${content.title}</h2>
                    <p>${listHtml}</p>
                `;
                textContainer.style.opacity = 1;
            }, 200);
        }

        // 监听滚动事件，控制蓝色面板形状
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            // 计算当前阶段（0-5）
            const currentStage = Math.min(Math.floor(scrollY / viewHeight), totalStages - 1);
            let clipPath = '';

            // 分阶段控制蓝色面板的形状，滚动时平滑变化
            switch(currentStage) {
                case 0:
                    // 阶段1：蓝色在左侧，斜切，露出右侧金色背景
                    clipPath = 'polygon(0 0, 70% 0, 50% 100%, 0 100%)';
                    break;
                case 1:
                    // 阶段2：蓝色在右侧，斜切，露出左侧金色背景
                    clipPath = 'polygon(30% 0, 100% 0, 100% 100%, 50% 100%)';
                    break;
                case 2:
                    // 阶段3：蓝色在下半屏，露出上半部分金色背景
                    clipPath = 'polygon(0 50%, 100% 50%, 100% 100%, 0 100%)';
                    break;
                case 3:
                    // 阶段4：蓝色在上半屏，露出下半部分金色背景
                    clipPath = 'polygon(0 0, 100% 0, 100% 50%, 0 50%)';
                    break;
                case 4:
                    // 阶段5：蓝色全屏覆盖，金色背景完全隐藏
                    clipPath = 'polygon(0 0, 100% 0, 100% 100%, 0 100%)';
                    break;
                case 5:
                    // 阶段6：蓝色在底部，露出上半部分金色背景
                    clipPath = 'polygon(0 30%, 100% 30%, 100% 100%, 0 100%)';
                    break;
            }

            // 应用蓝色面板的斜切形状
            slantPanel.style.clipPath = clipPath;
            slantPanel.style.webkitClipPath = clipPath;

            // 渲染当前阶段的文字内容
            renderContent(currentStage);
        });

        // 窗口大小变化适配
        window.addEventListener('resize', () => {
            viewHeight = window.innerHeight;
            window.dispatchEvent(new Event('scroll'));
        });

        // 页面加载初始化
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
